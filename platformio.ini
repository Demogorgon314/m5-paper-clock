[env:m5stack-fire]
platform = espressif32@^5.1.0
board = m5stack-fire
framework = arduino
board_build.filesystem = spiffs
platform_packages = platformio/framework-arduinoespressif32@3.20004.0
upload_speed = 1500000
monitor_speed = 115200
board_build.partitions = partitions_littlefs_16MB.csv
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -std=gnu++17
lib_deps =
    m5stack/M5EPD

[env:native]
platform = native
build_flags =
    -std=gnu++17
test_framework = unity
