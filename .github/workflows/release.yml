name: Release Firmware

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Build release package
        run: ./tools/package_release.sh
        env:
          FIRMWARE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
          RELEASE_BASE_URL: ${{ github.ref_type == 'tag' && format('https://github.com/{0}/releases/download/{1}', github.repository, github.ref_name) || '' }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: m5-paper-clock-firmware
          path: dist/m5-paper-clock-*/*

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --generate-notes
          fi
          gh release upload "$tag" dist/m5-paper-clock-*/* --clobber
